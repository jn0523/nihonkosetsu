<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="日本工設株式会社の会社概要ページです。不動産の賃貸及び管理業とアプリケーション開発業を展開しています。">
    <title>会社概要 | 日本工設株式会社</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #60a5fa, #8b5cf6);
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(96, 165, 250, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle animated background elements */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 40vw;
            height: 40vw;
            background: rgba(56, 189, 248, 0.2);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: rgba(167, 139, 250, 0.2);
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30px, 50px) scale(1.1);
            }
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* Glassmorphism Card */
        .company-profile {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out 0.2s both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .company-profile:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .profile-row {
            display: flex;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
        }

        .profile-row:hover {
            background-color: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        .profile-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .profile-row:first-child {
            padding-top: 0;
        }

        .row-header {
            width: 30%;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .row-content {
            width: 70%;
            font-weight: 400;
        }

        ul.business-purposes {
            list-style: none;
        }

        ul.business-purposes li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        ul.business-purposes li:last-child {
            margin-bottom: 0;
        }

        ul.business-purposes li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #8b5cf6;
            font-size: 1.2em;
            line-height: 1.2;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .contact-footer {
            text-align: center;
            margin-top: 3rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .contact-footer p {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .contact-footer a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .contact-footer a:hover {
            color: #a78bfa;
        }

        .contact-footer a::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #a78bfa;
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }

        .contact-footer a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .profile-row {
                flex-direction: column;
                padding: 1rem 0;
            }

            .row-header {
                width: 100%;
                margin-bottom: 0.5rem;
                font-size: 0.9rem;
            }

            .row-content {
                width: 100%;
            }

            .company-profile {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header>
            <h1>日本工設株式会社</h1>
            <div class="subtitle">Company Overview</div>
        </header>

        <main class="company-profile">
            <div class="profile-row">
                <div class="row-header">会社名</div>
                <div class="row-content">日本工設株式会社</div>
            </div>

            <div class="profile-row">
                <div class="row-header">設立</div>
                <div class="row-content">昭和46年（1971年）3月2日</div>
            </div>

            <div class="profile-row">
                <div class="row-header">資本金</div>
                <div class="row-content">1,000万円</div>
            </div>

            <div class="profile-row">
                <div class="row-header">代表者</div>
                <div class="row-content">代表取締役　内藤 淳之介</div>
            </div>

            <div class="profile-row">
                <div class="row-header">本店所在地</div>
                <div class="row-content">東京都中野区中央五丁目１２番１－１０３号</div>
            </div>

            <div class="profile-row">
                <div class="row-header">構成人数</div>
                <div class="row-content">1名</div>
            </div>

            <div class="profile-row">
                <div class="row-header">事業内容</div>
                <div class="row-content">
                    <ul class="business-purposes">
                        <li>不動産の賃貸及び管理業</li>
                        <li>アプリケーション開発業</li>
                    </ul>
                </div>
            </div>
        </main>

        <footer class="contact-footer">
            <p>お問い合わせは<a href="https://docs.google.com/forms/d/e/1FAIpQLSdkLEoxjHXS-Uq9_uAbIKo9T3bEFGlFypbnEbYlW5OAoZeV8g/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer">こちら</a></p>
        </footer>
    </div>
</body>

</html>
